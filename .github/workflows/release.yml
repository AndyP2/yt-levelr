name: Create Release with Zip

on:
  push:
    tags:
      - 'v*.*.*'  # Matches semver tags like v1.0.0
permissions:
  contents: write  # Required for release creation/upload

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Extract version from tag for manifest update and logging purposes only
      - name: Extract version from tag
        id: version
        run: echo "tag_version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Update manifest.json to match the Git tag
      - name: Sync manifest version with git tag
        run: |
          VERSION="${{ steps.version.outputs.tag_version }}"

          echo "Updating yt-levelr/manifest.json from v${VERSION}..."

          # replace only the version field
          sed -i "s/^\"version\": \".*$/\"version\": \"$VERSION\"/" yt-levelr/manifest.json

          # Verify the change was applied correctly before zipping
          echo "Updated manifest content:"
          cat yt-levelr/manifest.json | grep '"version"'

      # Build extension zip
      - name: Build extension zip
        run: |
          mkdir -p build
          cd yt-levelr && zip -r ../build/yt-levelr.zip .

      # Verify zip contents
      - name: Verify zip contents
        run: |
          unzip -l build/yt-levelr.zip > /dev/null || (echo "❌ Zip verification failed" && exit 1)

      # Create release and upload zip
      - name: Create release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: build/yt-levelr.zip
          generate_release_notes: true  # Auto-generates notes from commits
          draft: false
          prerelease: false
