name: Create Release with Zip

on:
  push:
    tags:
      - 'v*.*.*'  # Matches semver tags like v1.0.0; adjust pattern as needed

permissions:
  contents: write  # Required for release creation/upload

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          mkdir -p build
          cd yt-levelr && zip -r ../build/yt-levelr.zip .

      - name: Verify zip contents
        run: |
          unzip -l build/yt-levelr.zip

      - name: Create release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: build/yt-levelr.zip
          generate_release_notes: true  # Auto-generates notes from commits
          draft: false
          prerelease: false
